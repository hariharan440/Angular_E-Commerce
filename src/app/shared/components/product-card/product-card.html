<div class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm transition hover:-translate-y-1 hover:shadow-lg">
  <div class="flex flex-col h-full">
    <img [src]="product.images[0]?.image" alt="{{ product.name }}" class="h-44 w-full rounded-xl object-cover mb-4" />
    <div class="mb-4">
      <h2 class="text-lg font-semibold text-slate-900">{{ product.name }}</h2>
      <p class="text-sm text-slate-500 mt-1">{{ product.category }} · {{ product.seller }}</p>
    </div>
    <div class="mt-auto space-y-3">
      <div class="flex items-center justify-between">
        <span class="text-slate-600">₹{{ product.price }}</span>
        <span class="rounded-full bg-emerald-100 px-3 py-1 text-xs font-semibold text-emerald-700">In stock: {{ product.stock }}</span>
      </div>
      <div class="flex gap-2">
        <button class="w-full rounded-lg bg-indigo-600 px-4 py-2 text-sm font-semibold text-white hover:bg-indigo-700" (click)="view.emit(product)">View details</button>
        <button class="w-full rounded-lg bg-emerald-600 px-4 py-2 text-sm font-semibold text-white hover:bg-emerald-700" (click)="add.emit(product)">Add to cart</button>
      </div>
    </div>
  </div>
</div>
