<header class="bg-white shadow-sm">

  <div class="mx-auto max-w-6xl flex items-center justify-between p-4">

    <!-- Logo -->
    <a routerLink="/" class="text-xl font-bold text-indigo-700">
      KetosKart
    </a>

    <!-- Desktop Menu -->
    <nav class="hidden md:flex items-center gap-6 text-sm">
      <a routerLink="/" routerLinkActive="font-semibold text-indigo-700"
         class="text-slate-500 hover:text-indigo-700 transition">
        Products
      </a>
      <a routerLink="/cart" routerLinkActive="font-semibold text-indigo-700"
         class="text-slate-500 hover:text-indigo-700 transition">
        Cart
      </a>
      <a routerLink="/orders" routerLinkActive="font-semibold text-indigo-700"
         class="text-slate-500 hover:text-indigo-700 transition">
        Orders
      </a>
    </nav>

    <!-- Mobile Menu Button -->
    <button 
      class="md:hidden text-gray-700"
      (click)="isMenuOpen = !isMenuOpen">
      ☰
    </button>

  </div>

  <!-- Mobile Menu -->
  @if (isMenuOpen) {
    <div class="md:hidden px-4 pb-4 space-y-3">

      <a routerLink="/" 
         (click)="isMenuOpen=false"
         class="block text-slate-600 hover:text-indigo-700">
        Products
      </a>

      <a routerLink="/cart" 
         (click)="isMenuOpen=false"
         class="block text-slate-600 hover:text-indigo-700">
        Cart
      </a>

      <a routerLink="/orders" 
         (click)="isMenuOpen=false"
         class="block text-slate-600 hover:text-indigo-700">
        Orders
      </a>

    </div>
  }

</header>
