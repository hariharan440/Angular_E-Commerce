<div class="min-h-screen p-6">
  <div class="mx-auto max-w-5xl rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
    <ng-container *ngIf="product$ | async as product; else loading">
      <div class="grid gap-6 lg:grid-cols-[300px_1fr]">
        <img [src]="product.images[0]?.image" alt="{{ product.name }}" class="h-72 w-full rounded-xl object-cover" />
        <div class="space-y-4">
          <h1 class="text-3xl font-bold text-slate-900">{{ product.name }}</h1>
          <p class="text-sm text-slate-600">{{ product.category }} · {{ product.seller }}</p>
          <div class="flex items-center gap-3"><span class="text-2xl font-bold text-indigo-600">₹{{ product.price }}</span><span class="text-xs text-slate-500">Rating: {{ product.ratings }}</span></div>
          <p class="text-sm text-slate-700">{{ product.description }}</p>
          <span class="rounded-full bg-emerald-100 px-3 py-1 text-xs font-semibold text-emerald-700">Stock: {{ product.stock }}</span>
          <div class="flex gap-2 pt-4">
            <button class="rounded-lg bg-indigo-600 px-5 py-2 text-sm font-semibold text-white hover:bg-indigo-700" (click)="addToCart(product)">Add to Cart</button>
            <button class="rounded-lg bg-slate-100 px-5 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-200" (click)="goToCart()">View Cart</button>
          </div>
        </div>
      </div>
    </ng-container>

    <ng-template #loading>
      <div class="p-8 text-center text-slate-600">Loading product details…</div>
    </ng-template>
  </div>
</div>
