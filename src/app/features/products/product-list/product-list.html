<div class="min-h-screen bg-slate-50 p-6">
  <div class="mx-auto max-w-6xl space-y-4">
    <header class="rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
      <h1 class="text-3xl font-bold text-slate-900">Enterprise Product Catalog</h1>
      <p class="mt-2 text-sm text-slate-500">Browse, select, and add premium products to your corporate cart.</p>
    </header>

    <div class="grid gap-4 sm:grid-cols-2 xl:grid-cols-3">
      <ng-container *ngFor="let product of products$ | async">
        <app-product-card [product]="product" (view)="viewProduct($event)" (add)="addToCart($event)"></app-product-card>
      </ng-container>
    </div>
  </div>
</div>
